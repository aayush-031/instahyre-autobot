name: Daily Instahyre Apply

on:
  schedule:
    - cron: "0 5 * * *"   # 10:30 AM IST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📥 Install dependencies
        run: npm install

      - name: 🚀 Run Instahyre Auto Apply
        env:
          INSTAHYRE_EMAIL: ${{ secrets.INSTAHYRE_EMAIL }}
          INSTAHYRE_PASSWORD: ${{ secrets.INSTAHYRE_PASSWORD }}
          INSTAHYRE_COOKIES: ${{ secrets.INSTAHYRE_COOKIES }}
        run: |
          echo "Starting Instahyre auto-apply script at $(date)"
          npm start
          echo "✅ Script completed at $(date)"

      # 🧪 Upload debug screenshots (VERY useful)
      - name: 📸 Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
          if-no-files-found: ignore

      # 🪵 Upload logs (optional)
      - name: 🪵 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instahyre-logs
          path: logs/
          if-no-files-found: ignore